aid: serper
name: Serper
description: >-
  Serper is the world's fastest and most affordable Google Search API, delivering
  real-time SERP data in 1-2 seconds via a simple REST interface. It supports web
  search, images, news, maps, places, videos, shopping, scholar, patents, and
  autocomplete — all returned as structured JSON. Widely used in AI agents, LLM
  pipelines, and SEO tooling, Serper uses a credit-based model with 2,500 free
  queries and volume pricing down to $0.30 per 1,000 requests.
type: Index
