apis:
  - aid: serper:google-search-api
    name: Serper Google Search API
    description: >-
      RESTful API providing real-time Google Search Engine Results Page (SERP) data
      in structured JSON format. Supports web search, image search, news, maps,
      places, videos, shopping, scholar, patents, and autocomplete via a single
      POST endpoint. Authentication uses an X-API-KEY header. Designed for
      high-throughput AI and LLM applications with up to 300 queries per second.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
