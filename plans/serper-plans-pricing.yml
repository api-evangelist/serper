specificationVersion: "0.1"
id: serper-plans-pricing
name: Serper Plans and Pricing
description: >-
  Serper uses a credit-based pricing model. Credits are purchased in packages
  and are valid for 6 months. Pricing decreases with volume, from $1.00 per
  1,000 queries at the Starter tier down to $0.30 per 1,000 queries at the
  Ultimate tier. A free trial provides 2,500 credits with no credit card required.
  Requesting 100 results per page (vs the default 10) doubles credit consumption.
url: https://serper.dev

plans:
  - name: Free Trial
    description: >-
      2,500 free queries to evaluate the API with no credit card required.
      Includes full access to all search types and the standard rate limit.
    price: 0.00
    currency: USD
    billingPeriod: one-time
    credits: 2500
    creditExpiry: none
    rateLimits:
      requestsPerSecond: 50
    features:
      - Web search
      - Image search
      - News search
      - Maps and Places
      - Videos search
      - Shopping search
      - Scholar and Patents
      - Autocomplete
      - Structured JSON responses
      - X-API-KEY authentication

  - name: Starter
    description: >-
      Entry-level paid plan for individual developers and small applications.
      Credits are non-expiring prepaid bundles.
    price: 50.00
    currency: USD
    billingPeriod: one-time
    credits: 50000
    costPer1kCredits: 1.00
    creditExpiry: 6 months
    rateLimits:
      requestsPerSecond: 100
    features:
      - All Free Trial features
      - Prepaid credit model (no monthly lock-in)
      - Standard support

  - name: Standard
    description: >-
      Mid-volume plan suited to production AI agents and SEO tools. Includes
      priority support and higher concurrency limits.
    price: 375.00
    currency: USD
    billingPeriod: one-time
    credits: 500000
    costPer1kCredits: 0.75
    creditExpiry: 6 months
    rateLimits:
      requestsPerSecond: 150
    features:
      - All Starter features
      - Priority support
      - Higher rate limits

  - name: Scale
    description: >-
      High-volume plan for demanding SERP pipelines and large AI deployments.
    price: 1250.00
    currency: USD
    billingPeriod: one-time
    credits: 2500000
    costPer1kCredits: 0.50
    creditExpiry: 6 months
    rateLimits:
      requestsPerSecond: 200
    features:
      - All Standard features
      - Priority support
      - High concurrency

  - name: Ultimate
    description: >-
      Enterprise-grade plan with dedicated infrastructure, SLA coverage, and
      the lowest per-query rate of $0.30 per 1,000 queries. Default concurrency
      limit of 300 QPS with higher limits available upon request.
    price: 3750.00
    currency: USD
    billingPeriod: one-time
    credits: 12500000
    costPer1kCredits: 0.30
    creditExpiry: 6 months
    rateLimits:
      requestsPerSecond: 300
    features:
      - All Scale features
      - Dedicated infrastructure
      - SLA guarantee
      - Custom concurrency limits on request
